app = "ecom-chatbot-backend"
primary_region = "sin"

[http_service]
auto_start_machines = true
auto_stop_machines = true
force_https = true
internal_port = 8_000
min_machines_running = 1
processes = [ "app" ]

  [http_service.concurrency]
  hard_limit = 50
  soft_limit = 25
  type = "requests"

[[vm]]
cpu_kind = "shared"
cpus = 1
memory_mb = 1_024
